<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASCENT</title>
    <script>
      sessionStorage.redirect = location.href;
      var parts = location.pathname.split('/').filter(Boolean);
      var base = parts.length > 1 ? '/' + parts[0] + '/' : '/';
      location.replace(base);
    </script>
  </head>
  <body></body>
</html>
